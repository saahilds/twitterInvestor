# Production compose for VPS (Hetzner CX32). See docs/VPS.md.
services:
  bot:
    build: .
    container_name: twitter-trade-bot
    restart: unless-stopped
    env_file:
      - .env
    command:
      - uv
      - run
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ports:
      # Bind to localhost only; expose dashboard via Caddy on the host.
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data/trading_bot.db:/app/trading_bot.db
      - ./data/logs:/app/logs
      - ./data/x-profile:/app/.playwright/x-profile
      - ./data/rh-tokens:/root/.tokens
    shm_size: "1gb"
    init: true
